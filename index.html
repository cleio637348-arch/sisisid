<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

.plc-root {
  --bg: #14161b;
  --surface: #1b1e25;
  --surface-2: #242830;
  --border: #2f333d;
  --text: #eae7e0;
  --text-dim: #9a9da6;
  --accent: #c9a15a;
  --accent-dim: #8a744a;
  --ok: #5fa88f;
  --bad: #c1666b;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 640px;
  padding: 28px 20px 40px;
  border-radius: 12px;
  box-sizing: border-box;
}
.plc-root * { box-sizing: border-box; }
.plc-wrap { max-width: 560px; margin: 0 auto; }
.plc-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.plc-title {
  font-family: 'Fraunces', serif;
  font-size: 30px;
  font-weight: 600;
  margin: 0 0 6px;
  line-height: 1.15;
}
.plc-sub { color: var(--text-dim); font-size: 14px; margin: 0 0 26px; line-height: 1.5; }

.plc-home-grid { display: grid; gap: 14px; }
.plc-home-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  text-align: left;
  cursor: pointer;
  color: var(--text);
  transition: border-color .15s, transform .15s;
}
.plc-home-btn:hover { border-color: var(--accent-dim); transform: translateY(-1px); }
.plc-home-btn .h { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.plc-home-btn .d { font-size: 13px; color: var(--text-dim); }

.plc-back {
  background: none; border: none; color: var(--text-dim); font-size: 13px;
  cursor: pointer; margin-bottom: 16px; padding: 0; font-family: 'Inter', sans-serif;
}
.plc-back:hover { color: var(--text); }

.plc-field { margin-bottom: 16px; }
.plc-label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 6px; letter-spacing: .02em; }
.plc-input {
  width: 100%; background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 12px; border-radius: 7px; font-size: 14px;
  font-family: 'Inter', sans-serif;
}
.plc-input:focus { outline: none; border-color: var(--accent-dim); }

.plc-photo-drop {
  border: 1px dashed var(--border); border-radius: 10px; padding: 22px;
  text-align: center; cursor: pointer; color: var(--text-dim); font-size: 13px;
  background: var(--surface); position: relative; overflow: hidden;
}
.plc-photo-drop img { max-width: 100%; max-height: 160px; border-radius: 6px; display: block; margin: 0 auto; }

.plc-loading { display:flex; align-items:center; gap:10px; color: var(--text-dim); font-size: 13px; padding: 14px 0; }
.plc-spinner {
  width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border);
  border-top-color: var(--accent); animation: plcspin .8s linear infinite;
}
@keyframes plcspin { to { transform: rotate(360deg); } }

.plc-link-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; margin-bottom: 14px;
}
.plc-link-box .lbl { font-size: 12px; color: var(--accent); font-family:'IBM Plex Mono',monospace; letter-spacing:.05em; margin-bottom:6px; }
.plc-link-box .url {
  font-family:'IBM Plex Mono',monospace; font-size: 12px; color: var(--text-dim);
  word-break: break-all; background: var(--surface-2); padding: 8px 10px; border-radius: 6px; margin-bottom: 8px;
}
.plc-link-box .desc { font-size: 12px; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }

.plc-primary {
  background: var(--accent); color: #191a1d; border: none; border-radius: 8px;
  padding: 12px 18px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%;
  font-family: 'Inter', sans-serif; margin-top: 6px;
}
.plc-primary:hover { background: #d9b06c; }
.plc-primary:disabled { opacity: .4; cursor: default; }

.plc-error { color: var(--bad); font-size: 13px; margin-top: 10px; }
.plc-hint { color: var(--text-dim); font-size: 12px; margin-top: 6px; line-height: 1.5; }

.plc-code-box {
  background: var(--surface); border: 1px solid var(--accent-dim); border-radius: 10px;
  padding: 22px; text-align: center; margin-top: 10px;
}
.plc-code {
  font-family: 'IBM Plex Mono', monospace; font-size: 26px; letter-spacing: .12em;
  color: var(--accent); font-weight: 600; margin: 8px 0;
}
.plc-copy-btn {
  background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
  border-radius: 7px; padding: 8px 14px; font-size: 13px; cursor: pointer; margin-top: 6px;
}
.plc-copy-btn:hover { border-color: var(--accent-dim); }

.plc-vault {
  position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--border);
  background: #0e0f12; margin-bottom: 18px;
}
.plc-vault-photo {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  opacity: 0; transition: opacity .8s ease;
}
.plc-vault.solved .plc-vault-photo { opacity: 1; }
.plc-grid {
  position: relative; display: grid; gap: 3px; padding: 10px; justify-content: center;
}
.plc-cell {
  width: 30px; height: 30px; position: relative;
}
.plc-cell.void { background: transparent; }
.plc-cell.filled input {
  width: 100%; height: 100%; text-align: center; border: none; border-radius: 3px;
  background: var(--surface-2); color: var(--text); font-family: 'IBM Plex Mono', monospace;
  font-size: 15px; font-weight: 600; padding: 0; transition: background .5s, color .5s, opacity .5s;
}
.plc-cell.filled input:focus { outline: 2px solid var(--accent); }
.plc-cell .num {
  position: absolute; top: 1px; left: 2px; font-size: 8px; color: var(--accent);
  font-family: 'IBM Plex Mono', monospace; pointer-events: none;
}
.plc-vault.solved .plc-cell.filled input { background: transparent; color: transparent; opacity: 0; }

.plc-clues { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 13px; }
.plc-clues h4 {
  font-family: 'Fraunces', serif; font-size: 14px; color: var(--accent); margin: 0 0 8px;
  font-weight: 600;
}
.plc-clues li { margin-bottom: 6px; color: var(--text-dim); line-height: 1.4; }
.plc-clues li.done { color: var(--ok); text-decoration: line-through; }
.plc-clues ul { list-style: none; padding: 0; margin: 0; }

.plc-solved-banner {
  text-align: center; padding: 14px; color: var(--ok); font-family: 'Fraunces', serif;
  font-size: 16px; font-weight: 600; margin-bottom: 4px;
}
</style>

<div class="plc-root" id="plcRoot"></div>

<script>
(function(){
  const root = document.getElementById('plcRoot');
  let state = { screen: 'home' };
  let photoDataUrl = null;
  let themeHint = '';
  let currentPuzzle = null;
  let userGrid = {};
  const FIREBASE_PROJECT_ID = 'nonononono-421bf';

  function getHashParams(){
    const h = window.location.hash.replace(/^#/, '');
    const params = {};
    h.split('&').forEach(pair => {
      const [k,v] = pair.split('=');
      if (k) params[decodeURIComponent(k)] = decodeURIComponent(v||'');
    });
    return params;
  }

  function render(){
    if (state.screen === 'home') return renderHome();
    if (state.screen === 'create') return renderCreate();
    if (state.screen === 'created') return renderCreated();
    if (state.screen === 'enterCode') return renderEnterCode();
    if (state.screen === 'solve') return renderSolve();
  }

  function renderHome(){
    root.innerHTML = `
      <div class="plc-wrap">
        <div class="plc-eyebrow">Photo Lock</div>
        <h1 class="plc-title">사진을 잠그는 십자말풀이</h1>
        <p class="plc-sub">사진을 올리고 십자말풀이를 만들면, 상대방은 퍼즐을 다 풀어야만 사진을 볼 수 있어요.</p>
        <div class="plc-home-grid">
          <button class="plc-home-btn" id="btnCreate">
            <div class="h">퍼즐 만들기</div>
            <div class="d">사진 + 단어와 힌트를 입력해서 잠긴 퍼즐을 생성해요</div>
          </button>
          <button class="plc-home-btn" id="btnSolve">
            <div class="h">코드로 풀기</div>
            <div class="d">전달받은 코드를 입력해서 잠긴 사진에 도전해요</div>
          </button>
        </div>
      </div>`;
    document.getElementById('btnCreate').onclick = () => { state = {screen:'create'}; render(); };
    document.getElementById('btnSolve').onclick = () => { state = {screen:'enterCode', code:'', error:null}; render(); };
  }

  function resizeAndEncode(file, cb){
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    img.onload = () => {
      const maxW = 640;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      cb(canvas.toDataURL('image/jpeg', 0.6));
    };
    reader.readAsDataURL(file);
  }

  function renderCreate(){
    root.innerHTML = `
      <div class="plc-wrap">
        <button class="plc-back" id="back">← 뒤로</button>
        <div class="plc-eyebrow">퍼즐 만들기</div>
        <h1 class="plc-title">사진만 올리면 퍼즐은 자동으로 만들어요</h1>
        <div class="plc-field">
          <label class="plc-label">사진</label>
          <div class="plc-photo-drop" id="photoDrop">
            ${photoDataUrl ? `<img src="${photoDataUrl}">` : '클릭해서 사진 선택'}
          </div>
          <input type="file" accept="image/*" id="photoInput" style="display:none">
        </div>
        <div class="plc-field">
          <label class="plc-label">테마 힌트 (선택 — 비워두면 사진만 보고 알아서 골라요)</label>
          <input class="plc-input" id="themeInput" placeholder="예: 여행, 사랑, 반려동물" value="${themeHint.replace(/"/g,'&quot;')}">
        </div>
        <button class="plc-primary" id="genBtn">퍼즐 만들기</button>
        <div id="loadingBox"></div>
        <div class="plc-error" id="errBox"></div>
        <p class="plc-hint">사진을 분석할 수 있으면 사진 내용을 바탕으로, 분석이 어려우면(예: 이 파일을 다운로드해 브라우저에서 직접 열었을 때) 준비된 단어 은행에서 무작위로 골라 퍼즐을 만들어요.</p>
      </div>`;

    document.getElementById('back').onclick = () => { state = {screen:'home'}; render(); };
    document.getElementById('photoDrop').onclick = () => document.getElementById('photoInput').click();
    document.getElementById('photoInput').onchange = (e) => {
      const f = e.target.files[0];
      if (!f) return;
      resizeAndEncode(f, (dataUrl) => { photoDataUrl = dataUrl; render(); });
    };
    document.getElementById('themeInput').oninput = (e) => { themeHint = e.target.value; };

    document.getElementById('genBtn').onclick = async () => {
      const errBox = document.getElementById('errBox');
      const loadingBox = document.getElementById('loadingBox');
      errBox.textContent = '';
      if (!photoDataUrl) { errBox.textContent = '사진을 올려주세요.'; return; }

      const genBtn = document.getElementById('genBtn');
      genBtn.disabled = true;
      loadingBox.innerHTML = `<div class="plc-loading"><div class="plc-spinner"></div>사진을 보고 단어와 힌트를 만드는 중...</div>`;

      let wordList;
      let usedBank = false;
      try {
        wordList = await generateWordsFromPhoto(photoDataUrl, themeHint);
        if (!Array.isArray(wordList) || wordList.length < 2) throw new Error('empty');
      } catch (e) {
        usedBank = true;
        loadingBox.innerHTML = `<div class="plc-loading"><div class="plc-spinner"></div>사진 분석을 쓸 수 없어 무작위 단어로 만드는 중...</div>`;
        wordList = pickRandomWords(14);
      }

      const cleaned = wordList
        .map(w => ({ answer: (w.answer||'').replace(/\s/g,'').toUpperCase(), clue: (w.clue||'').trim() }))
        .filter(w => w.answer.length >= 2 && w.clue);
      const seen = new Set();
      const unique = cleaned.filter(w => { if (seen.has(w.answer)) return false; seen.add(w.answer); return true; });

      if (unique.length < 2) {
        errBox.textContent = '충분한 단어를 만들지 못했어요. 다시 시도해주세요.';
        genBtn.disabled = false; loadingBox.innerHTML = '';
        return;
      }

      loadingBox.innerHTML = `<div class="plc-loading"><div class="plc-spinner"></div>퍼즐을 배치하는 중...</div>`;
      const puzzle = buildCrossword(unique);
      if (!puzzle) { errBox.textContent = '퍼즐을 생성하지 못했어요. 다시 시도해주세요.'; genBtn.disabled=false; loadingBox.innerHTML=''; return; }
      puzzle.source = usedBank ? 'bank' : 'ai';

      const data = { photo: photoDataUrl, puzzle };
      const code = genCode();

      loadingBox.innerHTML = `<div class="plc-loading"><div class="plc-spinner"></div>Firestore에 저장하는 중...</div>`;
      try {
        await firestoreSave(FIREBASE_PROJECT_ID, code, data);
      } catch (e) {
        errBox.textContent = 'Firestore 저장에 실패했어요: ' + e.message + ' — puzzles 컬렉션의 보안 규칙을 확인해주세요.';
        genBtn.disabled=false; loadingBox.innerHTML='';
        return;
      }

      loadingBox.innerHTML = `<div class="plc-loading"><div class="plc-spinner"></div>저장 확인 중...</div>`;
      try {
        const verify = await firestoreLoad(FIREBASE_PROJECT_ID, code);
        if (!verify) {
          errBox.textContent = '저장은 됐지만 바로 다시 불러오는 데 실패했어요. Firestore 규칙에 read 권한도 열려 있는지 확인해주세요.';
          genBtn.disabled=false; loadingBox.innerHTML='';
          return;
        }
      } catch (e) {
        errBox.textContent = '저장 확인 중 오류: ' + e.message;
        genBtn.disabled=false; loadingBox.innerHTML='';
        return;
      }

      state = { screen: 'created', code };
      render();
    };
  }

  const WORD_BANK = [
    {answer:'사랑', clue:'마음이 향하는 가장 따뜻한 감정'},
    {answer:'우정', clue:'친구 사이에 쌓이는 믿음'},
    {answer:'추억', clue:'지나간 시간이 남긴 기억'},
    {answer:'여행', clue:'낯선 곳으로 떠나는 일'},
    {answer:'바다', clue:'파도가 치는 넓고 짠 물'},
    {answer:'하늘', clue:'구름이 떠다니는 머리 위 공간'},
    {answer:'구름', clue:'하늘에 떠 있는 하얀 덩어리'},
    {answer:'바람', clue:'눈에 안 보이지만 느껴지는 움직임'},
    {answer:'눈물', clue:'슬프거나 감동할 때 흐르는 것'},
    {answer:'미소', clue:'살짝 웃는 표정'},
    {answer:'행복', clue:'마음이 만족스럽고 즐거운 상태'},
    {answer:'설렘', clue:'좋은 일 앞에서 두근거리는 마음'},
    {answer:'그리움', clue:'보고 싶은 마음이 쌓인 감정'},
    {answer:'고양이', clue:'야옹 소리를 내는 반려동물'},
    {answer:'강아지', clue:'멍멍 짖는 반려동물'},
    {answer:'토끼', clue:'귀가 길고 깡충 뛰는 동물'},
    {answer:'거북이', clue:'등에 딱딱한 껍질을 진 느린 동물'},
    {answer:'나비', clue:'꽃을 좋아하는 날개 달린 곤충'},
    {answer:'벚꽃', clue:'봄에 흩날리는 분홍빛 꽃'},
    {answer:'단풍', clue:'가을에 붉게 물드는 나뭇잎'},
    {answer:'눈사람', clue:'겨울에 눈을 뭉쳐 만드는 것'},
    {answer:'우산', clue:'비 올 때 머리 위에 펴는 물건'},
    {answer:'커피', clue:'아침을 깨우는 쌉싸름한 음료'},
    {answer:'초콜릿', clue:'달콤하고 녹는 갈색 간식'},
    {answer:'케이크', clue:'생일에 촛불을 꽂는 디저트'},
    {answer:'라면', clue:'끓는 물에 넣고 3분 기다리는 면'},
    {answer:'김치', clue:'매콤하게 발효시킨 한국 반찬'},
    {answer:'딸기', clue:'빨갛고 씨가 겉에 박힌 과일'},
    {answer:'사과', clue:'하루 하나면 의사가 필요 없다는 과일'},
    {answer:'수박', clue:'여름을 대표하는 크고 둥근 과일'},

    {answer:'학교', clue:'매일 아침 가방 메고 가는 곳'},
    {answer:'교실', clue:'칠판과 책상이 있는 공간'},
    {answer:'운동장', clue:'뛰어놀고 체육하는 넓은 마당'},
    {answer:'놀이터', clue:'그네와 미끄럼틀이 있는 곳'},

    {answer:'사진', clue:'순간을 남기는 네모난 기록'},

    {answer:'달빛', clue:'밤에 은은하게 비추는 빛'},
    {answer:'노을', clue:'해질 무렵 하늘을 물들이는 색'},
    {answer:'새벽', clue:'해가 뜨기 직전의 고요한 시간'},
    {answer:'계절', clue:'봄여름가을겨울을 부르는 말'},
    {answer:'겨울', clue:'눈이 내리고 가장 추운 계절'},
    {answer:'여름', clue:'덥고 매미가 우는 계절'},
    {answer:'가을', clue:'단풍이 들고 선선해지는 계절'},
    {answer:'봄날', clue:'꽃이 피고 따뜻해지는 시절'},
    {answer:'축제', clue:'다 함께 즐기는 큰 행사'},

  function pickRandomWords(count){
    const pool = [...WORD_BANK];
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, Math.min(count, pool.length));
  }

  async function generateWordsFromPhoto(dataUrl, hint){
    const mediaType = dataUrl.substring(dataUrl.indexOf(':')+1, dataUrl.indexOf(';'));
    const base64 = dataUrl.split(',')[1];
    const varietySeed = Math.random().toString(36).slice(2, 8);
    const prompt = `이 사진을 보고 한국어 십자말풀이용 단어와 힌트를 12~14개 만들어줘.
조건:
- 정답은 2~5글자 한글 단어(사진 속 사물, 색, 분위기, 장소, 감정 등과 관련)
- 서로 겹치는 글자가 최대한 많이 나오도록 다양한 단어를 골라줘 (교차가 잘 되게)
- 힌트는 정답 단어나 그 일부를 절대 직접 말하지 말고, 한 단계 돌려서 생각해야 풀리는 약간 어려운 수수께끼 느낌으로 써줘
${hint ? `- 다음 테마를 참고해줘: ${hint}` : ''}
- 매번 다른 조합이 나오도록 사진에서 다양한 요소를 골라줘 (참고용 랜덤 시드: ${varietySeed})
- 반드시 아래 JSON 배열 형식으로만 답해. 다른 설명, 코드블록, 텍스트 없이 순수 JSON만 출력해.
[{"answer":"단어","clue":"힌트"}]`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
            { type: "text", text: prompt }
          ]
        }]
      })
    });
    const data = await response.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const jsonStart = clean.indexOf('[');
    const jsonEnd = clean.lastIndexOf(']');
    const parsed = JSON.parse(clean.slice(jsonStart, jsonEnd+1));
    return parsed;
  }

  function genCode(){
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let s = '';
    for (let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
    return s;
  }

  async function firestoreSave(projectId, code, payloadObj){
    const url = `https://firestore.googleapis.com/v1/projects/${encodeURIComponent(projectId)}/databases/(default)/documents/puzzles?documentId=${encodeURIComponent(code)}`;
    const body = { fields: { json: { stringValue: JSON.stringify(payloadObj) } } };
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const errText = await res.text().catch(()=> '');
      throw new Error('Firestore 저장 실패 (' + res.status + ') ' + errText.slice(0,200));
    }
    return true;
  }

  async function firestoreLoad(projectId, code){
    const url = `https://firestore.googleapis.com/v1/projects/${encodeURIComponent(projectId)}/databases/(default)/documents/puzzles/${encodeURIComponent(code)}`;
    const res = await fetch(url);
    if (res.status === 404) return null;
    if (!res.ok) {
      const errText = await res.text().catch(()=> '');
      throw new Error('Firestore 조회 실패 (' + res.status + ') ' + errText.slice(0,200));
    }
    const data = await res.json();
    const jsonStr = data?.fields?.json?.stringValue;
    if (!jsonStr) return null;
    return JSON.parse(jsonStr);
  }

  // --- crossword generator ---
  function buildCrossword(words){
    words = words.filter(w => w.answer.length >= 2);
    if (words.length < 1) return null;

    function tryLayout(orderedWords){
      const placed = [];
      const occ = {};

      function canPlace(answer, dir, row, col){
        const beforeR = dir==='down' ? row-1 : row;
        const beforeC = dir==='across' ? col-1 : col;
        if (occ[beforeR+','+beforeC] !== undefined) return false;
        const afterR = dir==='down' ? row+answer.length : row;
        const afterC = dir==='across' ? col+answer.length : col;
        if (occ[afterR+','+afterC] !== undefined) return false;

        for (let i=0;i<answer.length;i++){
          const r = dir==='down' ? row+i : row;
          const c = dir==='across' ? col+i : col;
          const key = r+','+c;
          const existing = occ[key];
          if (existing !== undefined){
            if (existing !== answer[i]) return false;
          } else {
            if (dir === 'across'){
              if (occ[(r-1)+','+c] !== undefined || occ[(r+1)+','+c] !== undefined) return false;
            } else {
              if (occ[r+','+(c-1)] !== undefined || occ[r+','+(c+1)] !== undefined) return false;
            }
          }
        }
        return true;
      }
      function place(answer, dir, row, col){
        for (let i=0;i<answer.length;i++){
          const r = dir==='down' ? row+i : row;
          const c = dir==='across' ? col+i : col;
          occ[r+','+c] = answer[i];
        }
      }

      place(orderedWords[0].answer, 'across', 0, 0);
      placed.push({...orderedWords[0], dir:'across', row:0, col:0});
      let connectedCount = 1;

      for (let i=1;i<orderedWords.length;i++){
        const w = orderedWords[i];
        let bestSpot = null;
        for (let pi=0; pi<placed.length && !bestSpot; pi++){
          const p = placed[pi];
          for (let a=0;a<w.answer.length && !bestSpot;a++){
            for (let b=0;b<p.answer.length && !bestSpot;b++){
              if (w.answer[a] !== p.answer[b]) continue;
              const newDir = p.dir === 'across' ? 'down' : 'across';
              let row, col;
              if (newDir === 'down'){ row = p.row - a; col = p.col + b; }
              else { row = p.row + b; col = p.col - a; }
              if (canPlace(w.answer, newDir, row, col)) bestSpot = {dir:newDir, row, col};
            }
          }
        }
        if (bestSpot){
          place(w.answer, bestSpot.dir, bestSpot.row, bestSpot.col);
          placed.push({...w, dir:bestSpot.dir, row:bestSpot.row, col:bestSpot.col});
          connectedCount++;
        } else {
          const rows = placed.map(p => p.dir==='down' ? p.row+p.answer.length-1 : p.row);
          const maxRow = Math.max(...rows, 0);
          const row = maxRow + 2, col = 0;
          place(w.answer, 'across', row, col);
          placed.push({...w, dir:'across', row, col});
        }
      }

      let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
      placed.forEach(p => {
        const endR = p.dir==='down' ? p.row+p.answer.length-1 : p.row;
        const endC = p.dir==='across' ? p.col+p.answer.length-1 : p.col;
        minR = Math.min(minR, p.row); maxR = Math.max(maxR, endR);
        minC = Math.min(minC, p.col); maxC = Math.max(maxC, endC);
      });
      const area = (maxR-minR+1) * (maxC-minC+1);
      return { placed, connectedCount, minR, maxR, minC, maxC, area };
    }

    // try many random orderings (longest word always first as anchor) and keep the best-connected, tightest layout
    const base = [...words].sort((a,b) => b.answer.length - a.answer.length);
    let best = null;
    const attempts = Math.min(60, 15 + words.length * 4);
    for (let attempt=0; attempt<attempts; attempt++){
      const rest = base.slice(1);
      for (let i=rest.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [rest[i], rest[j]] = [rest[j], rest[i]];
      }
      const ordered = [base[0], ...rest];
      const result = tryLayout(ordered);
      if (!best || result.connectedCount > best.connectedCount ||
          (result.connectedCount === best.connectedCount && result.area < best.area)) {
        best = result;
      }
      if (best.connectedCount === words.length) break;
    }

    const { placed, minR, maxR, minC, maxC } = best;
    const rows = maxR-minR+1, cols = maxC-minC+1;
    const cells = Array.from({length: rows}, () => Array(cols).fill(null));
    placed.forEach(p => {
      for (let i=0;i<p.answer.length;i++){
        const r = (p.dir==='down' ? p.row+i : p.row) - minR;
        const c = (p.dir==='across' ? p.col+i : p.col) - minC;
        cells[r][c] = { letter: p.answer[i] };
      }
    });

    let num = 1;
    const numAt = {};
    for (let r=0;r<rows;r++){
      for (let c=0;c<cols;c++){
        if (!cells[r][c]) continue;
        const startsAcross = (c===0 || !cells[r][c-1]) && c+1<cols && cells[r][c+1];
        const startsDown = (r===0 || !cells[r-1][c]) && r+1<rows && cells[r+1][c];
        if (startsAcross || startsDown){
          numAt[r+','+c] = num;
          cells[r][c].num = num;
          num++;
        }
      }
    }
    const wordsOut = placed.map(p => {
      const r = p.row - minR, c = p.col - minC;
      return { answer: p.answer, clue: p.clue, dir: p.dir, num: numAt[r+','+c] || 0 };
    });

    return { rows, cols, cells, words: wordsOut };
  }
